name: kdx
description: "A new Flutter project with Clean Architecture and BLoC State Management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  easy_localization: ^3.0.7
  flutter_screenutil: ^5.9.0
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  
  # Dependency Injection
  get_it: ^7.6.0
  
  # Networking & API
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Fonts & UI
  google_fonts: ^6.1.0

  shimmer: ^3.0.0
  url_launcher: ^6.3.2
  image_picker: ^1.2.2
  firebase_core: ^4.11.0
  firebase_analytics: ^12.4.3
  firebase_messaging: ^16.4.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^8.1.0
  firebase_auth: ^6.5.4
  google_mlkit_image_labeling: ^0.14.1
  webview_flutter: ^4.10.0
  tabby_flutter_inapp_sdk: ^2.0.0
  cached_network_image: ^3.4.1
  app_links: ^7.2.0
  flutter_paytabs_bridge: ^2.7.14
  envied: ^1.3.8
  flutter_dotenv: ^6.0.1
  pinput: ^6.0.2
  toastification: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  envied_generator: ^1.3.8
  build_runner: ^2.15.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/categories/
    - assets/translations/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
